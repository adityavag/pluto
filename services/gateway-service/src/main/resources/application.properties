server.port=8000
spring.application.name=gateway-service

# Route 1: Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:5002
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/account/**

# Route 2: Problem Service
spring.cloud.gateway.routes[1].id=problem-service
spring.cloud.gateway.routes[1].uri=http://localhost:8080
spring.cloud.gateway.routes[1].predicates[0]=Path=/problems/**

# Route 3: Submission Service Secured (POST)
spring.cloud.gateway.routes[2].id=submission-service-secured
spring.cloud.gateway.routes[2].uri=http://localhost:8081
spring.cloud.gateway.routes[2].predicates[0]=Path=/submissions/**
spring.cloud.gateway.routes[2].predicates[1]=Method=POST
spring.cloud.gateway.routes[2].filters[0]=JwtAuth

# Route 4: Submission Service Public (GET, etc.)
spring.cloud.gateway.routes[3].id=submission-service-public
spring.cloud.gateway.routes[3].uri=http://localhost:8081
spring.cloud.gateway.routes[3].predicates[0]=Path=/submissions/**
